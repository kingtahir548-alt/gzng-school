<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سیستەمی چالاکیەکانی قوتابخانەی گزنگ - وەشانی شەفاف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
        }

        body { 
            font-family: 'Noto Sans Arabic', sans-serif; 
            background: linear-gradient(45deg, #e0e7ff, #f3e8ff, #e0f2fe);
            background-attachment: fixed;
            min-height: 100vh;
            color: #1e293b;
            transition: all 0.5s ease;
            overflow-x: hidden;
        }

        .dark-mode {
            background: linear-gradient(45deg, #0f172a, #1e1b4b, #2e1065);
            color: #f8fafc;
        }

        /* Ultra Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
            border-radius: 2rem;
        }

        .dark-mode .glass-panel {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark-mode .glass-card {
            background: rgba(255, 255, 255, 0.03);
        }

        .glass-card:hover {
            transform: translateY(-8px) scale(1.01);
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .blob {
            position: fixed;
            z-index: -1;
            filter: blur(60px);
            border-radius: 50%;
            opacity: 0.6;
            animation: move 20s infinite alternate;
        }
        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        .dark-mode .glass-input {
            background: rgba(0, 0, 0, 0.2);
            color: white;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.8);
            border-color: var(--primary);
            outline: none;
        }

        .a4-page { 
            width: 210mm; 
            min-height: 297mm; 
            background: white !important; 
            padding: 15mm; 
            box-shadow: 0 0 40px rgba(0,0,0,0.2);
            color: #000 !important;
            transform-origin: top center;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .btn-glow {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
        }
        .btn-glow:hover {
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <!-- Background Decoration -->
    <div class="blob w-96 h-96 bg-indigo-300 top-0 -left-20"></div>
    <div class="blob w-80 h-80 bg-purple-300 bottom-0 right-0" style="animation-delay: -5s"></div>

    <div id="app" class="w-full relative z-10"></div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-white/30 backdrop-blur-xl z-[9999] flex flex-col items-center justify-center">
        <div class="glass-panel p-10 flex flex-col items-center">
            <div class="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="font-black text-indigo-900 dark:text-white">تکایە چاوەڕوانبە...</p>
        </div>
    </div>

    <!-- Notifications -->
    <div id="notification" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 z-[10000] animate-bounce">
        <div class="glass-panel px-8 py-4 flex items-center gap-4 border-b-4 border-indigo-600">
            <span class="text-2xl">✨</span>
            <div class="font-black text-slate-800 dark:text-white" id="notifTitle">کردارەکە سەرکەوت</div>
        </div>
    </div>

    <script>
        // --- CONFIG & STATE ---
        const CONFIG = {
            LOGO: "https://i.ibb.co/2766GHxS/logo-gzng.png",
            // Replace with your actual Web App URL after deployment
            API_URL: 'https://script.google.com/macros/s/AKfycby-htYBD80miX-o5WD--GQGNm8x77Cj8uxN_d3049nGjza1M5euueNeaO-hxhRYOK12/exec',
            STORAGE_KEY: 'gzng_v5_transparent_storage'
        };

        let state = {
            currentView: 'teacher',
            activities: [],
            isAdminAuth: false,
            adminPass: '',
            theme: localStorage.getItem('theme') || 'light',
            searchQuery: '',
            viewDay: 'شەممە',
            form: { teacherName: '', subject: '', activityName: '', dayOfWeek: '', lessonNumber: '', date: new Date().toISOString().split('T')[0] },
            report: { teacherName: '', activityName: '', date: '', images: [null, null, null, null], imgSettings: Array(4).fill().map(() => ({zoom: 1})) },
            showReportModal: false,
            showAdminReport: false,
            filterDate: new Date().toISOString().slice(0, 7),
            blockedDays: [],
            blockedLessons: []
        };

        // --- CORE LOGIC ---
        async function loadData() {
            const local = localStorage.getItem(CONFIG.STORAGE_KEY);
            if (local) {
                const d = JSON.parse(local);
                state.activities = d.activities || [];
                state.blockedDays = d.settings?.BlockedDays || [];
                state.blockedLessons = d.settings?.BlockedLessons || [];
                render();
            }
            try {
                const res = await fetch(CONFIG.API_URL);
                const data = await res.json();
                state.activities = data.activities;
                state.blockedDays = data.settings.BlockedDays;
                state.blockedLessons = data.settings.BlockedLessons;
                localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(data));
                render();
            } catch (e) { console.warn("Sync failed"); }
        }

        async function submitActivity() {
            if (!state.form.teacherName || !state.form.activityName || !state.form.dayOfWeek || !state.form.lessonNumber) {
                alert("تکایە هەموو خانەکان پڕبکەرەوە"); return;
            }
            if (state.blockedDays.includes(state.form.dayOfWeek) || state.blockedLessons.includes(state.form.lessonNumber)) {
                alert("ببورە، ئەم کاتە لە لایەن ئەدمینەوە داخراوە."); return;
            }
            toggleLoading(true);
            try {
                const res = await fetch(CONFIG.API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'submit', id: Date.now(), ...state.form }) 
                });
                const result = await res.json();
                if (result.result === "success") {
                    notify("تۆمارکرا و نامە نێردرا!");
                    state.form.activityName = '';
                    state.form.subject = '';
                    loadData();
                }
            } catch(e) {
                alert("کێشەیەک لە پەیوەندی سێرڤەر ڕوویدا");
            } finally { toggleLoading(false); }
        }

        // --- UI RENDERING ---
        function render() {
            const app = document.getElementById('app');
            document.body.className = state.theme === 'dark' ? 'dark-mode' : '';
            const isModal = state.showReportModal || state.showAdminReport;

            app.innerHTML = `
                ${isModal ? '' : renderHeader()}
                <div class="max-w-7xl mx-auto px-4 pb-20">
                    ${isModal ? '' : (state.currentView === 'admin' ? (state.isAdminAuth ? renderAdminDashboard() : renderAdminLogin()) : renderTeacherPortal())}
                </div>
                ${state.showReportModal ? renderPhotoReportModal() : ''}
                ${state.showAdminReport ? renderTableReportModal() : ''}
            `;
            if (isModal) handleScale();
        }

        function renderHeader() {
            return `
            <header class="py-10 px-6">
                <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-8">
                    <div class="flex items-center gap-6">
                        <div class="w-20 h-20 glass-panel p-3 flex items-center justify-center rotate-3 hover:rotate-0 transition-all">
                            <img src="${CONFIG.LOGO}" class="w-full h-full object-contain">
                        </div>
                        <div>
                            <h1 class="text-3xl font-black text-indigo-900 dark:text-indigo-300">قوتابخانەی گزنگ</h1>
                            <p class="text-sm font-bold opacity-60">بەڕێوەبردنی چالاکییەکان</p>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-4">
                        <div class="glass-panel p-1.5 flex gap-1">
                            <button onclick="state.currentView='teacher'; render()" class="px-6 py-2.5 rounded-2xl font-black text-sm transition-all ${state.currentView==='teacher' ? 'btn-glow' : 'hover:bg-white/20'}">مامۆستا</button>
                            <button onclick="state.currentView='admin'; render()" class="px-6 py-2.5 rounded-2xl font-black text-sm transition-all ${state.currentView==='admin' ? 'btn-glow' : 'hover:bg-white/20'}">ئەدمین</button>
                        </div>
                        <button onclick="toggleTheme()" class="w-12 h-12 glass-panel flex items-center justify-center text-xl hover:scale-110 transition-transform">
                            ${state.theme === 'light' ? '🌙' : '☀️'}
                        </button>
                    </div>
                </div>
            </header>`;
        }

        function renderTeacherPortal() {
            const filtered = state.activities.filter(a => a.dayOfWeek === state.viewDay && (a.teacherName.toLowerCase().includes(state.searchQuery.toLowerCase())));
            
            return `
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <!-- Registration Form -->
                <div class="lg:col-span-5">
                    <div class="glass-panel p-10 space-y-6">
                        <h2 class="text-2xl font-black text-indigo-600 mb-4">تۆمارکردن</h2>
                        <input type="text" value="${state.form.teacherName}" oninput="state.form.teacherName=this.value" class="glass-input w-full rounded-2xl px-6 py-4 font-bold outline-none" placeholder="ناوی مامۆستا">
                        <div class="grid grid-cols-2 gap-4">
                            <select onchange="state.form.dayOfWeek=this.value" class="glass-input w-full rounded-2xl px-4 py-4 font-bold outline-none">
                                <option value="">ڕۆژ هەڵبژێرە</option>
                                ${['شەممە', 'یەکشەممە', 'دووشەممە', 'سێشەممە', 'چوارشەممە', 'پێنجشەممە'].map(d => `<option value="${d}">${d}</option>`).join('')}
                            </select>
                            <select onchange="state.form.lessonNumber=this.value" class="glass-input w-full rounded-2xl px-4 py-4 font-bold outline-none">
                                <option value="">وانە</option>
                                ${['یەکەم', 'دووەم', 'سێیەم', 'چوارەم', 'پێنجەم', 'شەشەم'].map(l => `<option value="وانەی ${l}">${l}</option>`).join('')}
                            </select>
                        </div>
                        <input type="text" value="${state.form.subject}" oninput="state.form.subject=this.value" class="glass-input w-full rounded-2xl px-6 py-4 font-bold outline-none" placeholder="بابەت">
                        <input type="text" value="${state.form.activityName}" oninput="state.form.activityName=this.value" class="glass-input w-full rounded-2xl px-6 py-4 font-bold outline-none" placeholder="جۆری چالاکی">
                        <input type="date" value="${state.form.date}" oninput="state.form.date=this.value" class="glass-input w-full rounded-2xl px-6 py-4 font-bold outline-none text-center">
                        <button onclick="submitActivity()" class="w-full btn-glow py-5 rounded-[2rem] font-black text-lg">تۆمارکردنی چالاکی</button>
                    </div>
                </div>

                <!-- Activity Feed -->
                <div class="lg:col-span-7 space-y-6">
                    <div class="glass-panel p-4 flex flex-col md:flex-row gap-4">
                        <input type="text" placeholder="گەڕان بۆ مامۆستا..." oninput="state.searchQuery=this.value; render()" class="flex-1 bg-white/20 rounded-2xl py-3 px-6 font-bold outline-none">
                        <div class="flex gap-1 overflow-x-auto no-scrollbar">
                            ${['شەممە', 'یەکشەممە', 'دووشەممە', 'سێشەممە', 'چوارشەممە', 'پێنجشەممە'].map(d => `
                                <button onclick="state.viewDay='${d}'; render()" class="px-5 py-2 rounded-xl text-xs font-black transition-all ${state.viewDay===d ? 'bg-indigo-600 text-white' : 'hover:bg-white/20'}">${d}</button>
                            `).join('')}
                        </div>
                    </div>
                    <div class="space-y-4">
                        ${filtered.length ? filtered.map(a => `
                            <div class="glass-card p-6 rounded-[2rem] flex justify-between items-center group">
                                <div class="flex items-center gap-5">
                                    <div class="w-14 h-14 rounded-2xl bg-indigo-600/10 text-indigo-600 flex items-center justify-center font-black text-xl">${a.teacherName.charAt(0)}</div>
                                    <div>
                                        <h4 class="font-black text-lg">${a.teacherName}</h4>
                                        <p class="text-xs font-bold opacity-50">${a.subject || 'بێ بابەت'} • <span class="text-indigo-500">${a.activityName}</span></p>
                                    </div>
                                </div>
                                <div class="text-left">
                                    <span class="bg-indigo-600/10 text-indigo-600 px-4 py-1.5 rounded-xl text-[10px] font-black">${a.lessonNumber}</span>
                                    <p class="text-[9px] opacity-30 mt-2 font-mono">${a.date}</p>
                                </div>
                            </div>
                        `).join('') : '<div class="py-20 text-center opacity-20 font-black">هیچ چالاکییەک لەم ڕۆژەدا نییە</div>'}
                    </div>
                </div>
            </div>`;
        }

        function renderAdminLogin() {
            return `
            <div class="max-w-md mx-auto mt-20">
                <div class="glass-panel p-12 text-center">
                    <div class="text-5xl mb-8">🔒</div>
                    <h2 class="text-2xl font-black mb-10">چوونەژوورەوەی ئەدمین</h2>
                    <input id="admPass" type="password" placeholder="وشەی نهێنی" class="glass-input w-full rounded-2xl py-4 px-6 font-bold mb-8 outline-none text-center">
                    <button onclick="loginAdmin()" class="w-full btn-glow py-4 rounded-2xl font-black">چوونەژوورەوە</button>
                </div>
            </div>`;
        }

        async function loginAdmin() {
            const p = document.getElementById('admPass').value;
            toggleLoading(true);
            try {
                const res = await fetch(CONFIG.API_URL, { method: 'POST', body: JSON.stringify({ action: "login", password: p }) });
                const data = await res.json();
                if (data.result === "success") { 
                    state.isAdminAuth = true; 
                    state.adminPass = p; 
                    render(); 
                } else {
                    alert("تێپەڕەوشە هەڵەیە!");
                }
            } catch(e) { alert("کێشەیەک ڕوویدا"); }
            finally { toggleLoading(false); }
        }

        function renderAdminDashboard() {
            return `
            <div class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="glass-panel p-8">
                        <p class="text-[10px] font-black opacity-40 mb-2">کۆی گشتی چالاکییەکان</p>
                        <h3 class="text-5xl font-black">${state.activities.length}</h3>
                    </div>
                    <div class="glass-panel p-8 flex gap-2 items-center">
                        <button onclick="state.showAdminReport=true; render()" class="flex-1 btn-glow py-3 rounded-xl text-xs font-black">📊 خشتە</button>
                        <button onclick="state.showReportModal=true; render()" class="flex-1 bg-white/10 py-3 rounded-xl text-xs font-black">📸 وێنەیی</button>
                    </div>
                    <div class="glass-panel p-8 flex flex-col gap-2">
                        <button onclick="loadData()" class="w-full text-xs font-black opacity-60 hover:opacity-100">🔄 نوێکردنەوە</button>
                        <button onclick="state.isAdminAuth=false; render()" class="w-full text-xs font-black text-red-400">🚪 چوونەدەرەوە</button>
                    </div>
                </div>
                <div class="glass-panel overflow-hidden">
                    <div class="p-6 border-b border-white/10 font-black">بەڕێوەبردنی چالاکییەکان</div>
                    <div class="max-h-[500px] overflow-y-auto no-scrollbar">
                        ${state.activities.slice().reverse().map(a => `
                            <div class="p-6 border-b border-white/5 flex justify-between items-center hover:bg-white/5 transition-all">
                                <div>
                                    <p class="font-black">${a.teacherName}</p>
                                    <p class="text-xs opacity-40">${a.date} • ${a.dayOfWeek} • ${a.lessonNumber}</p>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="openPhotoReport('${a.id}')" class="w-10 h-10 glass-panel flex items-center justify-center hover:bg-indigo-600 hover:text-white transition-all">📸</button>
                                    <button onclick="deleteActivity('${a.id}')" class="w-10 h-10 glass-panel text-red-500 flex items-center justify-center hover:bg-red-600 hover:text-white transition-all">🗑️</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>`;
        }

        // --- REPORTS ---
        function openPhotoReport(id) {
            const a = state.activities.find(x => x.id == id);
            if (a) {
                state.report = { 
                    teacherName: a.teacherName, 
                    activityName: a.activityName, 
                    date: a.date, 
                    images: [null, null, null, null], 
                    imgSettings: Array(4).fill().map(() => ({zoom: 1})) 
                };
                state.showReportModal = true; 
                render();
            }
        }

        function renderPhotoReportModal() {
            return `
            <div class="fixed inset-0 bg-slate-900/95 z-[500] overflow-y-auto py-12 flex flex-col items-center">
                <div class="w-full max-w-[210mm] px-4 flex justify-between items-center mb-8 no-print">
                    <div class="flex gap-4">
                        <button onclick="downloadReport('photo-report-content')" class="btn-glow px-8 py-3 rounded-2xl font-black">داگرتن وەک وێنە</button>
                        <button onclick="state.showReportModal=false; render()" class="bg-white/10 text-white px-8 py-3 rounded-2xl font-black">داخستن</button>
                    </div>
                    <h3 class="text-white font-black text-xl">ڕاپۆرتی وێنەیی</h3>
                </div>
                <div id="photo-report-content" class="a4-page">
                    <div class="flex justify-between items-center border-b-4 border-indigo-600 pb-8 mb-10">
                        <img src="${CONFIG.LOGO}" class="w-24 h-24 object-contain">
                        <div class="text-center">
                            <h1 class="text-3xl font-black text-indigo-900">قوتابخانەی گزنگ</h1>
                            <p class="text-slate-400 font-bold tracking-widest uppercase">Activity Documentation Report</p>
                        </div>
                        <div class="text-left text-[10px] font-mono text-slate-300">
                            <p>Ref: GZNG-${Date.now().toString().slice(-4)}</p>
                            <p>Date: ${state.report.date || '---'}</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-8 mb-10">
                        <div class="bg-slate-50 p-6 rounded-3xl border-r-4 border-indigo-600">
                            <p class="text-[10px] text-slate-400 font-black mb-1 uppercase">Teacher</p>
                            <p class="text-xl font-black">${state.report.teacherName || 'ناو دیاری نەکراوە'}</p>
                        </div>
                        <div class="bg-slate-50 p-6 rounded-3xl border-r-4 border-indigo-600">
                            <p class="text-[10px] text-slate-400 font-black mb-1 uppercase">Activity</p>
                            <p class="text-xl font-black">${state.report.activityName || 'جۆر دیاری نەکراوە'}</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        ${state.report.images.map((img, i) => `
                            <div class="relative group aspect-[4/3] bg-slate-100 rounded-[2rem] overflow-hidden border-2 border-dashed border-slate-200 flex items-center justify-center">
                                ${img ? `<img src="${img}" class="w-full h-full object-cover">` : `
                                    <label class="w-full h-full flex flex-col items-center justify-center cursor-pointer hover:bg-slate-200 transition-colors">
                                        <span class="text-4xl mb-2">📸</span>
                                        <span class="text-[10px] font-black uppercase">Add Photo</span>
                                        <input type="file" class="hidden" onchange="handleFile(this, ${i})">
                                    </label>
                                `}
                            </div>
                        `).join('')}
                    </div>

                    <div class="mt-20 pt-10 border-t flex justify-between px-10">
                        <div class="text-center w-48"><p class="font-black mb-16 text-slate-800">واژۆی مامۆستا</p><div class="h-px bg-slate-300"></div></div>
                        <div class="text-center w-48"><p class="font-black mb-16 text-slate-800">واژۆی بەڕێوەبەر</p><div class="h-px bg-slate-300"></div></div>
                    </div>
                </div>
            </div>`;
        }

        function renderTableReportModal() {
            const filtered = state.activities.filter(a => a.date.startsWith(state.filterDate)).sort((a,b)=>a.date.localeCompare(b.date));
            return `
            <div class="fixed inset-0 bg-slate-900/98 z-[500] overflow-y-auto py-12 flex flex-col items-center">
                <div class="w-full max-w-[210mm] px-4 flex justify-between items-center mb-8 no-print">
                    <div class="flex gap-4">
                        <input type="month" value="${state.filterDate}" onchange="state.filterDate=this.value; render()" class="bg-white/10 text-white rounded-xl px-4 py-2 font-bold outline-none">
                        <button onclick="downloadReport('table-report-content')" class="btn-glow px-8 py-2 rounded-xl font-black">داگرتن</button>
                    </div>
                    <button onclick="state.showAdminReport=false; render()" class="bg-white/10 text-white px-8 py-2 rounded-xl font-black">داخستن</button>
                </div>
                <div id="table-report-content" class="a4-page">
                    <div class="flex justify-between items-center border-b-4 border-indigo-900 pb-8 mb-8">
                        <img src="${CONFIG.LOGO}" class="w-20 h-20 object-contain">
                        <div class="text-center">
                            <h1 class="text-3xl font-black text-indigo-900">خشتەی چالاکییەکان</h1>
                            <h2 class="text-lg font-bold text-slate-400 mt-1">مانگی ${state.filterDate}</h2>
                        </div>
                        <div class="w-20"></div>
                    </div>
                    <table class="w-full text-sm border-collapse">
                        <thead>
                            <tr class="bg-indigo-600 text-white">
                                <th class="p-3 border text-right">#</th>
                                <th class="p-3 border text-right">مامۆستا</th>
                                <th class="p-3 border text-center">بەروار</th>
                                <th class="p-3 border text-right">بابەت و چالاکی</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${filtered.map((a, i) => `
                                <tr class="${i%2===0?'bg-slate-50':''}">
                                    <td class="p-3 border font-bold text-slate-400">${i+1}</td>
                                    <td class="p-3 border font-black text-slate-800">${a.teacherName}</td>
                                    <td class="p-3 border text-center font-mono text-slate-500">${a.date}</td>
                                    <td class="p-3 border text-slate-700"><b>${a.subject || '---'}</b> - ${a.activityName}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div class="mt-auto pt-10 text-right">
                        <p class="text-xs font-bold text-slate-400">کۆی گشتی چالاکییەکان: ${filtered.length}</p>
                    </div>
                </div>
            </div>`;
        }

        // --- UTILS ---
        function toggleTheme() { state.theme = state.theme === 'light' ? 'dark' : 'light'; localStorage.setItem('theme', state.theme); render(); }
        
        function toggleLoading(s) { 
            const overlay = document.getElementById('loadingOverlay');
            if(overlay) overlay.classList.toggle('hidden', !s); 
        }

        function notify(t) {
            const n = document.getElementById('notification');
            if(n) {
                document.getElementById('notifTitle').innerText = t;
                n.classList.remove('hidden');
                setTimeout(() => n.classList.add('hidden'), 3000);
            }
        }

        function handleFile(input, idx) {
            if (input.files[0]) {
                const r = new FileReader();
                r.onload = e => { state.report.images[idx] = e.target.result; render(); };
                r.readAsDataURL(input.files[0]);
            }
        }

        function handleScale() {
            const page = document.querySelector('.a4-page');
            if (page) page.style.transform = `scale(${Math.min(1, (window.innerWidth - 40) / 794)})`;
        }

        async function downloadReport(id) {
            toggleLoading(true);
            try {
                const canvas = await html2canvas(document.getElementById(id), { scale: 2, useCORS: true });
                const link = document.createElement('a');
                link.download = `Gzng_Report_${Date.now()}.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                link.click();
            } catch(e) { alert("هەڵەیەک لە دروستکردنی وێنەکەدا ڕوویدا"); }
            finally { toggleLoading(false); }
        }

        async function deleteActivity(id) {
            if (!confirm("ئایا دڵنیای لە سڕینەوەی ئەم چالاکییە؟")) return;
            toggleLoading(true);
            try {
                const res = await fetch(CONFIG.API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'delete', id: id, password: state.adminPass }) 
                });
                const data = await res.json();
                if(data.result === "success") {
                    loadData();
                } else {
                    alert("سڕینەوە سەرکەوتوو نەبوو");
                }
            } finally { toggleLoading(false); }
        }

        window.onresize = handleScale;
        window.onload = loadData;
    </script>
</body>
</html>
